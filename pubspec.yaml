name: mi_app_habitos
description: "A new Flutter project."
publish_to: 'none'
version: 3.0.0+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  shared_preferences: ^2.3.5
  cupertino_icons: ^1.0.8 
  table_calendar: ^3.1.2
  fl_chart: ^1.2.0
  audioplayers: ^6.1.1
  confetti: ^0.8.0
  timezone: ^0.11.0
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  
  # Notificaciones y servicios locales
  flutter_local_notifications: ^21.0.0 
  provider: ^6.1.2
  flutter_heatmap_calendar: ^1.0.5
  share_plus: ^12.0.1
  google_mobile_ads: ^7.0.0
  path_provider: ^2.1.5

  # --- BLOQUE FIREBASE SINCRONIZADO ---
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

  # Herramientas de generación y localización
  flutter_gen: ^5.9.0
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # INTEGRACIÓN: Herramienta para generar iconos de launcher
  flutter_launcher_icons: ^0.13.1

# CONFIGURACIÓN DEL ICONO:
# Recuerda colocar tu imagen en assets/icon/app_icon.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFF5252" # Tu color rojo institucional
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  generate: true

  # INTEGRACIÓN: Asegúrate de tener estas carpetas creadas para tus recursos
  assets:
    - assets/icon/
    - assets/images/